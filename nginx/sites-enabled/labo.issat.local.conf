server {
    listen 80;
    server_name labo.issat.local 192.168.11.196 127.0.0.1;

    # Portail Authentik
    location / {
        proxy_pass http://192.168.1.3:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Redirection vers le bureau actif de l'étudiant
    location /bureau {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Cookie $http_cookie;
    }

    # Lancement d'un TP depuis le portail Authentik
    # Chaque application Authentik pointe vers /lancer-tp/<nom_tp>
    location /lancer-tp/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Cookie $http_cookie;
    }

    location /debug-session {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
    }

    # Endpoint auth_request interne (vérifie que l'étudiant accède à son propre bureau)
    location = /auth-kasm {
        internal;
        proxy_pass http://127.0.0.1:8080/auth-kasm;
        proxy_set_header Host $host;
        proxy_set_header Cookie $http_cookie;
        proxy_set_header X-Original-URI $request_uri;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
    }

    # Bureaux VDI — protégés par auth_request
    # Les locations dynamiques par container sont incluses depuis kasm-locations/
    location ^~ /kasm/ {
        auth_request /auth-kasm;
        error_page 401 = @login;
        error_page 403 = @forbidden;
        include /etc/nginx/kasm-locations/*.conf;
    }

    location @login {
        return 302 http://labo.issat.local;
    }

    location @forbidden {
        return 403 "Acces refuse - Ce bureau ne vous appartient pas.";
    }
}
